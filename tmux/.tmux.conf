unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-Space
set -g mouse on

# ============================================================================
# TMUX CHEATSHEET (prefix = Ctrl+Space)
# ============================================================================
# WINDOWS (tabs):
#   Ctrl+Space + c          - Create new window
#   Ctrl+Space + n          - Next window
#   Ctrl+Space + p          - Previous window
#   Ctrl+Space + [0-9]      - Jump to specific window
#   Ctrl+Space + w          - List all windows (interactive)
#   Ctrl+Space + ,          - Rename window
#   Ctrl+Space + &          - Kill window
#
# PANES (splits):
#   Ctrl+Space + |          - Split pane vertically
#   Ctrl+Space + -          - Split pane horizontally
#   Alt + h/j/k/l           - Navigate panes (left/down/up/right)
#   Ctrl+Space + s          - Toggle synchronized input (run commands on all panes)
#   Ctrl+Space + :          - Enter command mode
#   :setw synchronize-panes - Toggle synchronized input (manual command)
#
# SESSIONS (background/foreground):
#   Ctrl+Space + d          - Detach session (send to background)
#   tmux ls                 - List all sessions
#   tmux a -t name          - Attach to specific session
#   tmux attach             - Attach to last session
#   tmux new-session -s name - Create named session
#   tmux kill-session -t name - Kill specific session
#   tmux kill-server        - Kill all sessions
#
# OTHER:
#   Ctrl+Space + r          - Reload config
#   Ctrl+Space + ?          - Show all keybindings
# ============================================================================

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# toggle synchronize-panes
bind s setw synchronize-panes

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.0'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Some basic mocha colors.
set -g @ctp_bg "#24273a"
set -g @ctp_surface_1 "#494d64"
set -g @ctp_fg "#cad3f5"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"

# status line
set -gF status-style "bg=#{@ctp_bg},fg=#{@ctp_fg}"
set -g status-left "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] #S #[bg=#{@ctp_bg},fg=#{@ctp_mauve}]"
set -g status-right "#[bg=#{@ctp_bg},fg=#{@ctp_mauve}]#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] %H:%M %d-%b-%y "
set -g status-left-length 50
set -g status-right-length 50

# windows
set -gF window-status-format "#[bg=#{@ctp_surface_1},fg=#{@ctp_fg}] ##W |"
set -gF window-status-current-format "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] ##W |"

# Panes
set -g pane-border-status top
set -g pane-border-format "#{pane_current_command} - #T"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'
